{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
    .subtitle-container {
        position: relative;
        width: 100%;
        height: 100vh;
        background-color: #000;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        padding: 2rem;
    }
    
    .subtitle-box {
        width: 80%;
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .subtitle-text {
        font-size: 2rem;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        margin: 0.5rem 0;
    }
    
    .subtitle-translation {
        font-size: 1.5rem;
        color: #ffd700;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
    
    .cefr-badge {
        position: absolute;
        top: 1rem;
        right: 1rem;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        font-weight: bold;
    }
    
    .controls {
        position: absolute;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 1rem;
        background-color: rgba(0, 0, 0, 0.7);
        padding: 1rem;
        border-radius: 0.5rem;
    }
    
    .btn-control {
        background-color: #fff;
        color: #000;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 0.25rem;
        cursor: pointer;
    }
    
    .btn-control:hover {
        background-color: #ddd;
    }
</style>
{% endblock %}

{% block content %}
<div class="subtitle-container">
    <div class="subtitle-box">
        <div id="original-subtitle" class="subtitle-text"></div>
        <div id="translated-subtitle" class="subtitle-translation"></div>
    </div>
    <div id="cefr-badge" class="cefr-badge"></div>
    
    <div class="controls">
        <button class="btn-control" id="play-pause">Play/Pause</button>
        <button class="btn-control" id="restart">Restart</button>
        <input type="range" id="progress" min="0" max="100" value="0" class="form-range">
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const subtitleData = [];
    let currentSubtitleIndex = 0;
    let isPlaying = false;
    let startTime = null;
    
    // Fetch subtitle data
    fetch(`/subtitles/${subtitleFileId}/data/`)
        .then(response => response.json())
        .then(data => {
            subtitleData.push(...data.subtitles);
        });
    
    function updateSubtitles(currentTime) {
        const subtitle = subtitleData[currentSubtitleIndex];
        if (!subtitle) return;
        
        const start = timeToSeconds(subtitle.start);
        const end = timeToSeconds(subtitle.end);
        
        if (currentTime >= start && currentTime <= end) {
            document.getElementById('original-subtitle').textContent = subtitle.original;
            document.getElementById('translated-subtitle').textContent = subtitle.translation;
            document.getElementById('cefr-badge').textContent = subtitle.cefr_level;
            document.getElementById('cefr-badge').className = `cefr-badge bg-${getCefrColor(subtitle.cefr_level)}`;
        } else if (currentTime > end) {
            currentSubtitleIndex++;
            if (currentSubtitleIndex >= subtitleData.length) {
                stopPlayback();
            }
        }
    }
    
    function timeToSeconds(timeStr) {
        const [hours, minutes, seconds] = timeStr.split(':');
        const [secs, ms] = seconds.split(',');
        return parseInt(hours) * 3600 + parseInt(minutes) * 60 + parseInt(secs) + parseInt(ms) / 1000;
    }
    
    function getCefrColor(level) {
        const colors = {
            'A1': 'success',
            'A2': 'info',
            'B1': 'primary',
            'B2': 'warning',
            'C1': 'danger',
            'C2': 'dark'
        };
        return colors[level] || 'secondary';
    }
    
    function startPlayback() {
        if (!isPlaying) {
            isPlaying = true;
            startTime = Date.now() - (currentSubtitleIndex > 0 ? timeToSeconds(subtitleData[currentSubtitleIndex - 1].end) * 1000 : 0);
            requestAnimationFrame(updatePlayback);
        }
    }
    
    function stopPlayback() {
        isPlaying = false;
    }
    
    function updatePlayback() {
        if (!isPlaying) return;
        
        const currentTime = (Date.now() - startTime) / 1000;
        updateSubtitles(currentTime);
        
        // Update progress bar
        const progress = (currentTime / (timeToSeconds(subtitleData[subtitleData.length - 1].end))) * 100;
        document.getElementById('progress').value = progress;
        
        requestAnimationFrame(updatePlayback);
    }
    
    // Event listeners
    document.getElementById('play-pause').addEventListener('click', () => {
        if (isPlaying) {
            stopPlayback();
        } else {
            startPlayback();
        }
    });
    
    document.getElementById('restart').addEventListener('click', () => {
        currentSubtitleIndex = 0;
        startTime = Date.now();
        document.getElementById('original-subtitle').textContent = '';
        document.getElementById('translated-subtitle').textContent = '';
        document.getElementById('cefr-badge').textContent = '';
        document.getElementById('progress').value = 0;
        startPlayback();
    });
    
    document.getElementById('progress').addEventListener('input', (e) => {
        const progress = e.target.value;
        const totalDuration = timeToSeconds(subtitleData[subtitleData.length - 1].end);
        const newTime = (progress / 100) * totalDuration;
        
        // Find the subtitle index for the new time
        currentSubtitleIndex = subtitleData.findIndex(sub => 
            timeToSeconds(sub.start) <= newTime && timeToSeconds(sub.end) >= newTime
        );
        
        if (currentSubtitleIndex === -1) {
            currentSubtitleIndex = 0;
        }
        
        startTime = Date.now() - newTime * 1000;
        updateSubtitles(newTime);
    });
});
</script>
{% endblock %}
